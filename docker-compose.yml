services:
  mysql:
    image: mysql:8.4
    container_name: petmart-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: petmart
      MYSQL_USER: flashcard
      MYSQL_PASSWORD: flashcard123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Dump20260408.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flashcard", "-pflashcard123"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
